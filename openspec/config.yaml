schema: spec-driven

context: |
  This repository uses a hybrid OpenSpec + .agent workflow.

  docs/ is project knowledge:
  - docs/project-context.md is canonical broad context.
  - docs/requirements/ contains curated requirement briefs.

  OpenSpec is the only executable change and accepted-spec layer:
  - openspec/changes/<change-id>/ contains proposal, delta specs, design, tasks, apply-progress, and verification evidence.
  - openspec/specs/ contains accepted behavior after archive.

  .agent is technical governance:
  - AGENTS.md is the root Codex entry point.
  - .agent/skill-registry.md resolves exact skills.
  - .agent/contracts/phase-handoff.md defines specialized handoffs.
  - .agent/skills/spec-driven-development/SKILL.md defines the lifecycle.
  - .agent/skills/implementation-progress/SKILL.md defines progress and evidence.
  - .agent/skills/verification-harness/SKILL.md defines final gates.

  Stack:
  - Next.js App Router, React, TypeScript, Tailwind CSS, shadcn/ui and Radix UI.
  - React Hook Form and Zod, next-intl, TanStack Table, Sonner.
  - Node.js 20.19.0 or newer, pnpm 10.30.2, exact global OpenSpec CLI 1.6.0.

rules:
  proposal:
    - Cite the driving requirement brief when one exists; explicitly record no requirement when the change is requirementless technical work.
    - State intent, scope, non-goals, dependencies, and open questions.
    - Include measurable success criteria and a rollback strategy.
    - Identify capability impact and keep changes focused.
    - Do not bulk-convert project-context.md into specs.
  specs:
    - Write behavior-first requirements with testable Given, When, Then scenarios.
    - Use focused ADDED, MODIFIED, REMOVED, or RENAMED deltas relative to current behavior.
    - Preserve stable requirement intent and avoid unrelated rewrites.
    - Reference requirement IDs and business rules when relevant.
  design:
    - Follow module-architecture when module behavior applies.
    - Record decisions, alternatives, rationale, interfaces, risks, migration or rollout, rollback, and verification approach.
    - Use only dependencies already present unless the user explicitly approves a new dependency.
    - Identify exact applicable .agent skills and responsibility boundaries.
    - Address i18n, data, SSR, forms, filters, and verification only when relevant.
  tasks:
    - Break work into small, independently verifiable steps traceable to proposal, specs, and design.
    - Keep checkbox tasks current; tasks.md is the completion authority.
    - Include progress creation or updates for implemented changes.
    - Include verification tasks for OpenSpec validation, non-incremental TypeScript, lint, and Next.js build.
    - Include verification commands that can finish before report creation.
    - Treat verify-report creation, native archive placement, and post-archive requirement/index updates as close operations rather than task checkboxes.
